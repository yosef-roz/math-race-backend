<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        .button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .footer {
            font-size: 0.8em;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body dir="rtl">
<h1 th:text="'שלום ' + ${name} + '!'"></h1>
<p>קיבלנו בקשה לאיפוס הסיסמה עבור החשבון שלך ב-**Math Race**.</p>
<p>כדי לבחור סיסמה חדשה, לחץ על הכפתור למטה:</p>

<br>
<a th:href="${resetUrl}" class="button">איפוס סיסמה</a>
<br><br>

<p>אם הכפתור לא עובד, העתק את הקישור הבא לדפדפן:</p>
<p th:text="${resetUrl}"></p>

<hr>
<div class="footer">
    <p>אם לא ביקשת לאפס את הסיסמה שלך, אפשר להתעלם מהודעה זו בבטחה. הסיסמה הנוכחית שלך תישאר ללא שינוי.</p>
</div>
</body>
</html>
